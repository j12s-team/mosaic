name: CI

on:
  push:
    branches: [main, wave3/dapp]
  pull_request:
    branches: [main, wave3/dapp]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Tests
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build
        env:
          MOSAIC_USE_MOCKS: "true"
