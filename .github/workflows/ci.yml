name: CI

on:
  push:
    branches: [main, wave3/dapp]
  pull_request:
    branches: [main, wave3/dapp]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck libs (isolated)
        run: npm run typecheck:libs

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          MOSAIC_USE_MOCKS: "true"
